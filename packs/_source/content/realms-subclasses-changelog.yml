      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <ul><li><p>Migrated to updated build + distribution
        system</p></li><li><p>Added stable UUIDs (breaking compatibility with
        v1.0)</p></li><li><p>Updated compendium art used to match art used in
        the 5eUA for FoundryVTT homepage</p></li><li><p>Changed
        @UUID[Compendium.UA2025-RealmsSubclasses.classes.Item.uarsPdkKnightlyE]{Knighly
        Envoy} to a Cast Activity rather than Item (spell) grant to better
        reflect the UA contents</p></li><li><p>Macro for correcting Purple
        Dragon Companion summon has been removed.</p><ul><li><p>Functionality
        now rolled into module automatically or by fixing the summon
        activity</p></li></ul></li><li><p>Improved Elemental Shield macro and
        dialog</p><ul><li><p>New styling to match idiomatic dnd5e2
        Applications</p></li><li><p>Moved to a single document (should feel
        _slightly_ snappier)</p></li><li><p>Moved from socketlib to Foundry's
        basic socket API</p></li></ul></li><li><p>Added auto-opening changelog
        following an update to the module</p></li></ul>
