  - sort: 100000
    name: College of the Moon (Bard)
    type: subclass
    _id: OGg3eAW6ujJPIfmY
    system:
      item: Compendium.UA2025-RealmsSubclasses.classes.Item.uarsComCollegeof
      description:
        value: >-
          <blockquote><p>Inspire Allies with Primal Tales</p></blockquote><p>The
          College of the Moon traces its origins to the ancient druidic circles
          of the Moonshae Isles, who entrusted the first Bards of this tradition
          with chronicling the stories of the islands and their people. Bards of
          this college draw from the isles’ Fey magic and the primal power of
          the moonwells to bolster their allies, protect the natural world, and
          inspire their bardic works. Such works tend to be based on well-known
          Moonshae myths such as the whimsy of fairy pranksters, the viciousness
          of the Beast, and the mysteries of the moonwells.</p>
