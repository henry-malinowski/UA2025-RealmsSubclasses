  - sort: 200000
    name: Knowledge Domain (Cleric)
    type: subclass
    _id: 0U02KO2bGOXdFVH8
    system:
      item: Compendium.UA2025-RealmsSubclasses.classes.Item.uarsKnowledgeDom
      description:
        value: >-
          <blockquote><p>Unearth Secrets and Master the
          Mind</p></blockquote><p>The Knowledge Domain values learning and
          understanding above all. Clerics who tap into this domain study
          esoteric lore, collect old tomes, delve into the secret places of the
          earth, and examine the process of the mind itself.</p><p>Gods of
          knowledge vary from masters of arcane magic to patrons of craft and
          invention. To them, knowledge is more valuable than material wealth,
          and the desire to learn is an act of worship. Libraries, universities,
          and other institutions dedicated to education also draw on the power
          of the Knowledge Domain.</p><p>On Faerûn, Clerics of the Knowledge
          Domain worship deities of learning and ingenuity like Oghma and Gond.
          Other powerful deities—such as Asmodeus, Mystra, Savras, and
          Jergal—also count Clerics of the Knowledge Domain among their
          devotees, as do less-common divinities like Deneir, the Scribe of
          Oghma, and Azuth, servant of Mystra.</p><hr><h3>Design Note: Knowledge
          Domain Updates</h3><p>Here are the main updates in this subclass since
          its appearance in the <em>Player’s Handbook</em>
          (2014):</p><ul><li><p><strong>Blessings of Knowledge</strong> now
          gives you proficiency with a type of Artisan’s
          Tools.</p></li><li><p><strong>Knowledge Domain</strong> Spells have
          been updated to include more damaging and combat-relevant options. The
          number of spells has also increased.</p></li><li><p><strong>Mind
          Magic</strong> is a new feature that allows you to expend a use of
          Channel Divinity to cast one of your domain spells without expending a
          spell slot.</p></li><li><p><strong>Unfettered Mind</strong> is a new
          feature that grants you telepathy and consistent Intelligence
          checks.</p></li><li><p><strong>Divine Foreknowledge</strong> is a new
          feature that allows you to gain Advantage on D20 Tests for 1
          hour.</p></li></ul><hr>
