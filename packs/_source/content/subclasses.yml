  - sort: 700000
    name: Spellfire Sorcery (Sorcerer)
    type: subclass
    _id: 1UGpR1C7GS9Nxxvx
    system:
      item: Compendium.UA2025-RealmsSubclasses.classes.Item.uarsSpellfireSor
      description:
        value: >-
          <blockquote><p>Radiate Raw Magic Potential</p></blockquote><p>Your
          innate power stems from the source of magic itself: the Weave. This
          connection manifests as a rare ability known as spellfire, and you
          surge with radiant bursts of this raw magic. Your talent with
          spellfire allows you to heal allies, sear enemies, and absorb powerful
          spells.</p><p>Wielders of spellfire tend to be adventurous souls with
          penchants for wandering. Many travel between cosmopolitan settlements,
          such as those along the Sword Coast, and wield their magic in service
          of the common good. Others prioritize the realization of their own
          strange powers by roaming equally strange lands, from the
          magic-blasted wastes of the Anauroch Desert to the god-touched wilds
          of the Old Empires. Wherever they go in the Realms, spellfire
          Sorcerers are often courted by factions with interests in the arcane
          arts, such as the Harpers and the Cult of the Dragon.</p>
