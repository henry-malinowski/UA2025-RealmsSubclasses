  - sort: 300000
    name: Purple Dragon Knight (Fighter)
    type: subclass
    _id: Xh1GTvSz17lL7APR
    system:
      item: Compendium.UA2025-RealmsSubclasses.classes.Item.uarsPurpleDragon
      description:
        value: >-
          <blockquote><p>Herald the Majesty of Amethyst
          Dragons</p></blockquote><p>The Purple Dragon Knights are paragons of
          valor and leadership who partner with amethyst dragons. Such knights
          aspire to protect the innocent and rally fellow adventurers to the
          causes of justice and freedom. Although the Purple Dragons were
          originally founded in Cormyr, new recruits are enlisted from any
          realms where chivalry is in abundance, including the Silver Marches,
          Damara, and Chessenta.</p><p>Characters with this subclass are special
          among the order. Unlike most Purple Dragons, who partner with amethyst
          dragons who’ve already reached adulthood, a Purple Dragon Knight
          character psionically bonds with an amethyst dragon hatchling. This
          bond irrevocably transforms both dragon and knight, allowing the
          dragon to grow in strength alongside its partner
          knight.</p><hr><h3>Design Note: Purple Dragon Knight
          Updates</h3><p>Here are the main updates in this subclass since its
          appearance in <em>Sword Coast Adventurer’s
          Guide</em>:</p><ul><li><p><strong>Knightly Envoy</strong> (formerly
          Royal Envoy) has been moved to level 3. It now lets you learn an
          additional language and cast the Comprehend Languages spell as a
          Ritual.</p></li><li><p><strong>Purple Dragon Companion</strong> is a
          new feature that gives the Purple Dragon Knight a dragon
          companion.</p></li><li><p><strong>Dragon Rider</strong> is a new
          feature that improves the dragon companion, allowing you to heal it
          with your Second Wind and ride it in a limited
          capacity.</p></li><li><p><strong>Rallying Surge</strong> (formerly
          Inspiring Surge) now lets you choose up to three creatures within a
          more limited radius. It also gives chosen creatures a retreat
          option.</p></li><li><p><strong>Amethyst Pinnacle</strong> is a new
          feature that again improves your dragon companion, allowing you to
          ride it unrestricted and attack in
          tandem.</p></li><li><p><strong>Enduring Commander</strong> is a new
          feature that grants both you and your dragon companion
          Resistances.</p><hr></li></ul>
