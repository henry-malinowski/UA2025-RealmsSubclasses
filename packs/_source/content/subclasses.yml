  - sort: 400000
    name: Oath of the Noble Genies (Paladin)
    type: subclass
    _id: huCUuqbEwIOT9j6T
    system:
      item: Compendium.UA2025-RealmsSubclasses.classes.Item.uarsNobleGeniesO
      description:
        value: >-
          <blockquote><p>Brandish the Elemental Splendor of
          Genies</p></blockquote><p>Paladins sworn to the Oath of the Noble
          Genies revere the forces of the Elemental Planes. Through taking this
          oath, Paladins draw power from the four different types of genies—dao,
          masters of earth; djinn, masters of air; efreet, masters of fire; and
          marids, masters of water—to create splendid and destructive displays
          of elemental might.</p><p>On Faerûn, many Paladins who swear this oath
          hail from Calimshan, a land rife with genie-kind. Despite their strong
          local ties, these Calishite Paladins often undertake quests that take
          them all over the Realms and across the multiverse—including,
          naturally, the Elemental Planes.</p><p>These paladins share the
          following tenets:</p><ul><li><p>Beget creation with
          destruction.</p></li><li><p>Lead with splendor and
          grace.</p></li><li><p>Respect the elements, and fear their
          wrath.</p></li></ul>
