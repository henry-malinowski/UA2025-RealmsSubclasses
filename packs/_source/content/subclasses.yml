  - sort: 800000
    name: Bladesinger (Wizard)
    type: subclass
    _id: mFAYYtMWAESSFUf4
    system:
      item: Compendium.UA2025-RealmsSubclasses.classes.Item.uarsBladesingerW
      description:
        value: >-
          <blockquote><p>Wield Sword and Sorcery in Elegant
          Tandem</p></blockquote><p>Bladesingers master a tradition of wizardry
          that incorporates swordplay and dance. In combat, a Bladesinger uses a
          series of intricate, elegant maneuvers that fend off harm and allow
          the Bladesinger to channel magic into devastating attacks and a
          cunning defense. Many who have observed a Bladesinger at work remember
          the display as one of the more beautiful experiences in their life, a
          glorious dance accompanied by a singing blade.</p><p>Bladesinging is
          strongly associated with the ancient elven societies that first
          mastered the art and coined the term. Even today, most Bladesingers
          still hail from old elven realms, such as Cormanthyr, or from
          non-elven societies that share land and history with elves, such as
          the Silver Marches. Wherever they hail from, Bladesingers are known
          for taking their talents all across the Realms in order to help common
          people and perform heroic deeds. Few communities greet the arrival of
          a Bladesinger as anything but a good omen.</p><hr><h3>Design Note:
          Bladesinger Updates</h3><p>Here are the main updates in this subclass
          since its appearance in Tasha’s Cauldron of
          Everything:</p><ul><li><p><strong>Bladesong</strong> now allows you to
          use your Intelligence modifier for attack and damage rolls while the
          song is active. The number of uses is now tied to your Intelligence
          modifier.</p></li><li><p><strong>Training in War and Song</strong> now
          grants you proficiency in a skill chosen from a list of options.
          Expanded weapon proficiencies have replaced armor training, and you
          can now use a weapon as a Spellcasting
          Focus.</p></li><li><p><strong>Song of Victory</strong> now allows you
          to make a weapon attack as a Bonus Action after casting a spell with
          an action.</p></li></ul><hr>
