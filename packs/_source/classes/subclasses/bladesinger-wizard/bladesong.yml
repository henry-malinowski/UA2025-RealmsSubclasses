  advancement: []
  description:
    value: >-
      <p>As a Bonus Action, you invoke an elven magic called the Bladesong,
      provided you aren’t wearing armor or using a Shield.</p><p>The Bladesong
      lasts for 1 minute and ends early if you have the
      &amp;Reference[Incapacitated] condition, if you don armor or a Shield, or
      if you use two hands to make an attack with a weapon. You can dismiss the
      Bladesong at any time (no action required).</p><p>While the Bladesong is
      active, you gain the following benefits. You can invoke the Bladesong a
      number of times equal to your Intelligence modifier (minimum of once), and
      you regain all expended uses when you finish a Long
      Rest.</p><p><em><strong>Agility.</strong></em> You gain a bonus to your AC
      equal to your Intelligence modifier (minimum of +1), and your Speed
      increases by 10 feet.</p><p><em><strong>Bladework.</strong></em> Whenever
      you attack with a weapon with which you have proficiency, you can use your
      Intelligence modifier for the attack and damage rolls instead of using
      Strength or Dexterity.</p><p><em><strong>Focus.</strong></em> When you
      make a Constitution saving throw to maintain Concentration, you can add
      your Intelligence modifier to the total.</p><section class="secret"
      id="secret-acLD8a5wEP2Lgsb6"><p><strong>Foundry Note</strong></p><p>This
      feature has an Active Effect to automate Agility and Focus. There is also
      an Enchantment activity to give a weapon the option to attack with
      Intelligence instead of the normal attack.</p></section>
