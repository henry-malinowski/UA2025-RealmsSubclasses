  description:
    value: >-
      <blockquote><p>Wield Sword and Sorcery in Elegant
      Tandem</p></blockquote><p>Bladesingers master a tradition of wizardry that
      incorporates swordplay and dance. In combat, a Bladesinger uses a series
      of intricate, elegant maneuvers that fend off harm and allow the
      Bladesinger to channel magic into devastating attacks and a cunning
      defense. Many who have observed a Bladesinger at work remember the display
      as one of the more beautiful experiences in their life, a glorious dance
      accompanied by a singing blade.</p><p>Bladesinging is strongly associated
      with the ancient elven societies that first mastered the art and coined
      the term. Even today, most Bladesingers still hail from old elven realms,
      such as Cormanthyr, or from non-elven societies that share land and
      history with elves, such as the Silver Marches. Wherever they hail from,
      Bladesingers are known for taking their talents all across the Realms in
      order to help common people and perform heroic deeds. Few communities
      greet the arrival of a Bladesinger as anything but a good omen.</p>
