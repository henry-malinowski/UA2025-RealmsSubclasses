  description:
    value: >-
      <p>As a &amp;Reference[Bonus Action], you gain the following benefits for
      1 minute. Once you use this Bonus Action, you can’t use it again until you
      finish a Long Rest unless you spend 7
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbscrFontOfMagi]{Sorcery
      Points} (no action required) to restore your use of
      it.</p><p><em><strong>Burning Life Force.</strong></em> Once per turn when
      you are hit by an attack roll, you can expend a number of Hit Dice, up to
      a maximum equal to your Charisma modifier (minimum of one). Roll the
      expended dice and reduce the amount of damage from that attack equal to
      the total rolled plus your Sorcerer
      level.</p><p><em><strong>Flight.</strong></em> You gain a Fly Speed of 60
      feet and can hover.</p><p><em><strong>Spell Avoidance.</strong></em> When
      you’re subjected to a spell or magical effect that allows you to make a
      saving throw to take only half damage, you instead take no damage if you
      succeed on the saving throw and only half damage if you fail. You can’t
      use this benefit if you have the &amp;Reference[Incapacitated apply=false]
      condition.</p><section class="secret"
      id="secret-w6YzppJoEvcDvt8w"><p><strong>Foundry Note</strong></p><p>This
      feature comes with 3 active effects that start disabled. When after using
      this feature, enable the appropriate active effect for the duration and
      disable at the duration's conclusion.</p><p>Buring Life Force has an
      associated healing activity for reducing the damage taking. If the healing
      granted is greater than the damage that would be taken, apply neither
      healing nor damage.</p></section>
    chat: ''
