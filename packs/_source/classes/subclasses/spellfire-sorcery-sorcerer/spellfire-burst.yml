  description:
    value: >-
      <p>When you spend at least 1
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbscrFontOfMagi]{Sorcery
      Point} as part of the &amp;Reference[Magic] action or a
      &amp;Reference[Bonus Action] on your turn, you can unleash one of the
      following magical effects of your choice. You can do so only once per
      turn.</p><p><em><strong>Bolstering Flames.</strong></em> You or one
      creature you can see within 30 feet of yourself gains Temporary Hit Points
      equal to [[/heal 1d4+@abilities.cha.mod]]{1d4 plus your Charisma
      modifier}.</p><p><em><strong>Radiant Fire.</strong></em> One creature you
      can see within 30 feet of yourself must succeed on a Dexterity saving
      throw against your spell save DC or take 1d6 Fire or Radiant damage (your
      choice).</p>
