  description:
    value: >-
      <p>When a creature hits you with an attack roll, you can take a
      &amp;Reference[Reaction] to force the creature to make a [[/save
      ability=wis dc=@abilities.wis.dc]]{Wisdom saving throw} against your spell
      save DC. On a failed save, the target has the &amp;Reference[Frightened]
      condition until the end of your next turn. While Frightened, a target’s
      &amp;Reference[Speed] is reduced to 0 feet.</p><p>You can use this
      Reaction a number of times equal to your Wisdom modifier (minimum of
      once), and you regain all expended uses when you finish a
      &amp;Reference[Long Rest].</p>
