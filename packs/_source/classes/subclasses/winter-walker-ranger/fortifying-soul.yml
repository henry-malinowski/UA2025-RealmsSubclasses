  description:
    value: >-
      <p>Your experience surviving harrowing environments allows you to bolster
      your allies in addition to yourself. When you finish a
      &amp;Reference[Short Rest], you can choose a number of creatures you can
      see equal to your Wisdom modifier (minimum of one). A chosen creature
      regains Hit Points equal to [[/heal 1d10+@classes.ranger.level
      type=temphp]]{1d10 plus your Ranger level} and has
      &amp;Reference[Advantage] on saving throws to avoid or end the
      &amp;Reference[Frightened] condition for 1 hour.</p><p>Once you use this
      feature, you can’t use it again until you finish a &amp;Reference[Long
      Rest].</p>
