  description:
    value: >-
      <p>You gain the following benefits.</p><p><em><strong>Frost
      Resistance.</strong></em> You have &amp;Reference[Resistance] to
      &amp;Reference[Cold] damage.</p><p><em><strong>Polar
      Strikes.</strong></em> When you hit a creature with a weapon, you can deal
      an extra [[/damage 1d4 type=cold]] damage to the target, which can take
      this extra damage only once per turn. This extra damage ignores Resistance
      to Cold damage. When you reach Ranger level 11, this extra damage
      increases to [[/damage 1d6 type=cold]]{1d6}.</p>
