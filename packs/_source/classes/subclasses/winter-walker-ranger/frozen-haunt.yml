  description:
    value: >-
      <p>When you cast
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplHuntersMar]{Hunter’s
      Mark}, you can adopt a ghostly, snowy form. This form lasts until the
      spell ends, and while you are in this form, you gain the following
      benefits. Once you use this feature, you can’t use it again until you
      finish a &amp;Reference[Long Rest] unless you expend a level 4+ spell slot
      (no action required).</p><p><em><strong>Frozen Soul.</strong></em> You
      have Immunity to &amp;Reference[Cold] damage. When you first adopt this
      form and at the start of each of your subsequent turns, each creature of
      your choice in a 15-foot Emanation originating from you takes [[/damage
      2d4 Cold]] damage.</p><p><em><strong>Partially Incorporeal.</strong></em>
      You have Immunity to the &amp;Reference[Grappled apply=false],
      &amp;Reference[Prone apply=false], and &amp;Reference[Restrained
      apply=false] conditions. You can move through creatures and objects as if
      they were &amp;Reference[Difficult Terrain], but you take [[/damage 1d10
      Force]] damage if you end your turn inside a creature or an object. If the
      form ends while you are inside a creature or an object, you are shunted to
      the nearest unoccupied space.</p>
