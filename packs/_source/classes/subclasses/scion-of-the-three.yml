  description:
    value: >-
      <blockquote><p>Become a Gruesome Agent of Malice</p></blockquote><p>A
      Scion of the Three draws power from a group of malevolent gods known as
      the Dead Three: Bane, deity of tyranny; Bhaal, deity of violence and
      murder; and Myrkul, deity of death. While some Rogues of this subclass
      pledge themselves ardently to those three macabre gods, others find
      themselves thrust on this path by a curse. Either way, a scion’s power
      manifests as various occult gifts, as well as an uncanny talent for
      striking and terrifying foes.</p><p>Scions of the Three are most common in
      Baldur’s Gate, where the Dead Three have long competed for influence over
      mortal hearts. Underground cults to Bane, Bhaal, and Myrkul often count
      Scions of the Three among their most useful agents. Outside Baldur’s Gate,
      secular thieves’ guilds such as the Shadow Thieves of Amn or Xanathar’s
      guild in Waterdeep might cautiously call on a Scion of the Three to
      undertake an especially violent contract.</p>
