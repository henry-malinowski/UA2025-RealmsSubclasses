  description:
    value: >-
      <p>You always have the
      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplMoonbeam00]{Moonbeam}spell
      prepared.</p><p>As a Bonus Action, you can cast Moonbeam without expending
      a spell slot. When you cast it using this feature, you glow faintly while
      you maintain &amp;Reference[Concentration] on the spell. While glowing,
      you shed &amp;Reference[Dim Light] out to 5 feet, and whenever a creature
      fails its saving throw against the effects of this Moonbeam, another
      creature of your choice that you can see within 60 feet of you regains
      [[/heal 2d4]] Hit Points.</p><p>Once you use this feature, you can’t use
      it again until you finish a &amp;Reference[Long Rest]. You can also
      restore your use of it by expending a level 3+ spell slot (no action
      required).</p>
