  description:
    value: >-
      <p>As a &amp;Reference[Magic] action, you can invoke the power of a
      folktale, imbuing yourself with primal magic until you use this feature
      again. When you use this feature, choose which of the following folktales
      you invoke; your choice gives you certain benefits while this magic is
      active.</p><p><em><strong>Tale of Life.</strong></em> You invoke a tale of
      vitality and thriving earth. When you restore &amp;Reference[Hit Points]
      to a creature with a spell, you can expend a
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbbrdBardicInsp]{Bardic
      Inspiration} die and increase the amount of Hit Points restored by a
      number equal to a roll of the Bardic Inspiration die. You can do this only
      once per turn.</p><p><em><strong>Tale of Gloam.</strong></em> You invoke a
      tale of mystery and secrets. When you use a Bonus Action to give a
      creature a Bardic Inspiration die, you can take the
      &amp;Reference[Disengage] or &amp;Reference[Hide] action as part of that
      Bonus Action.</p><p><em><strong>Tale of Mirth.</strong></em> You invoke a
      tale of merriment and fey guile. When an enemy you can see within 60 feet
      of yourself succeeds on a saving throw, you can take a
      &amp;Reference[Reaction]{Reaction} to expend a Bardic Inspiration die. The
      creature then must roll the Bardic Inspiration die and subtract the number
      rolled from the save’s total, possibly causing the save to fail.</p>
