  description:
    value: >-
      <p>You are bonded with an amethyst dragon hatchling that serves as your
      purple dragon companion and uses the Purple Dragon Companion stat block.
      The purple dragon is &amp;Reference[Friendly] to you and your allies and
      obeys your commands.</p><p><em><strong>The Dragon in Combat.</strong></em>
      In combat, the dragon acts during your turn. It can move and use its
      &amp;Reference[Reaction]{Reaction} on its own, but the only action it
      takes is the &amp;Reference[Dodge] action unless you take a
      &amp;Reference[Bonus Action] to command it to take an action in its stat
      block or some other action. If you have the &amp;Reference[Incapacitated
      apply=false] condition, the dragon acts on its own and isn’t limited to
      the Dodge action.</p><p><em><strong>Resurrecting the Dragon.</strong></em>
      If the dragon companion has died within the last hour, you can take a
      &amp;Reference[Magic] action to touch the dragon and expend a use of your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbftrSecondWind]{Second
      Wind}. The dragon returns to life after 1 minute with all its Hit Points
      restored.</p><p>Otherwise, you can perform a 1-hour ceremony to resurrect
      the dragon; this ceremony can be performed as part of a
      &amp;Reference[Short Rest]{Short} or &amp;Reference[Long Rest].</p>
