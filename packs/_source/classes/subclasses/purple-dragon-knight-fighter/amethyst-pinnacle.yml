  description:
    value: >-
      <p>You and your purple dragon gain the following
      benefits.</p><p><em><strong>Superior Mount.</strong></em> The purple
      dragon grows to Large size, and both its Speed and its Fly Speed increase
      to 40 feet. Additionally, the dragon no longer falls at the end of a turn
      if airborne while you’re riding it.</p><p><em><strong>Tandem
      Attack.</strong></em> When you take the &amp;Reference[Attack] action on
      your turn, you can forego one of your attacks to command the dragon to
      make one Rend attack. Alternatively, you can forego two of your attacks to
      command the dragon to use Gravity Breath.</p>
