  description:
    value: >-
      <p>When you use your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbftrActionSurg]{Action
      Surge}, you can choose up to three allies within a 30-foot Emanation
      originating from you. Each ally can take a
      &amp;Reference[Reaction]{Reaction} to use one of the following
      options.</p><p><em><strong>Advance.</strong></em> The ally makes one
      attack with a weapon or an &amp;Reference[Unarmed Strike]. If your purple
      dragon is one of the allies using Advance, the dragon can make one Rend
      attack.</p><p><em><strong>Retreat.</strong></em> The ally moves up to half
      its &amp;Reference[Speed] without provoking &amp;Reference[Opportunity
      Attacks].</p>
