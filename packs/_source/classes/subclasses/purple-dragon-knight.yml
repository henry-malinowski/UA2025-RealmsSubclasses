  description:
    value: >-
      <blockquote><p>Herald the Majesty of Amethyst
      Dragons</p></blockquote><p>The Purple Dragon Knights are paragons of valor
      and leadership who partner with amethyst dragons. Such knights aspire to
      protect the innocent and rally fellow adventurers to the causes of justice
      and freedom. Although the Purple Dragons were originally founded in
      Cormyr, new recruits are enlisted from any realms where chivalry is in
      abundance, including the Silver Marches, Damara, and
      Chessenta.</p><p>Characters with this subclass are special among the
      order. Unlike most Purple Dragons, who partner with amethyst dragons
      who’ve already reached adulthood, a Purple Dragon Knight character
      psionically bonds with an amethyst dragon hatchling. This bond irrevocably
      transforms both dragon and knight, allowing the dragon to grow in strength
      alongside its partner knight.</p>
