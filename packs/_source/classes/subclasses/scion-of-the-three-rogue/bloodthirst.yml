  description:
    value: >-
      <p>If your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbrgeSneakAttac]{Sneak
      Attack} hits a &amp;Reference[Bloodied] creature, the target takes extra
      damage of the weapon’s type equal to half your Rogue level (round
      up).</p><p>In addition, when an enemy you can see is reduced to 0 Hit
      Points, you can take a &amp;Reference[Reaction] and teleport to an
      unoccupied space you can see within 30 feet of yourself. You can then make
      one melee attack. You can use this Reaction a number of times equal to
      your Intelligence modifier (minimum of once), and you regain all expended
      uses when you finish a &amp;Reference[Long Rest].</p><section
      class="secret" id="secret-ZfppnAvj48544sVX"><p><strong>Foundry
      Note</strong></p><p>This feature includes a Damage Activity that will
      display your current additional damage against a Bloodied creature. You
      may also add half your current Rogue level rounded up (currently
      <strong>[[lookup @scale.rogue.sneak-attack.number]]</strong>) as a
      situational damage bonus when you use Sneak Attack.</p></section>
