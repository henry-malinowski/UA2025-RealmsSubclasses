  description:
    value: >-
      <p>You gain the following benefits.</p><p><em><strong>Battle
      Tyrant.</strong></em> You have &amp;Reference[Advantage] on attack rolls
      against any creature with the &amp;Reference[Frightened apply=false]
      condition.</p><p><em><strong>Murderous Intent.</strong></em> When you roll
      for your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbrgeSneakAttac]{Sneak
      Attack} damage, you can treat a roll of a 1 or 2 on the die as a
      3.</p><section class="secret"
      id="secret-H2bT2gAAPek8HRLc"><p><strong>Foundry
      Note</strong></p><p>Murderous Intent is automatically applied to your
      Sneak Attack ability but not Cunning Strikes. To add Murderous Intent to
      your Cunning Strikes will need to Modify the Effect of the Cunning Strike
      &gt; Cunning Sneak Attack activity.</p><ul><li><p><strong>Cunning Strike
      &gt; Cunning Sneak:</strong> Add <code>min3</code> to the end of the
      formula.</p></li></ul></section>
