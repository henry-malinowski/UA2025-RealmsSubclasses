  description:
    value: >-
      <p>You radiate malignant power associated with one of the Dead Three. At
      the start of each of your turns, each creature of your choice within a
      10-foot Emanation originating from you takes damage equal to your
      Intelligence modifier (minimum of 1); the damage type is the same as the
      damage Resistance granted by your choice in the Dread Allegiance
      feature.</p><p>Damage dealt by this aura ignores Resistance. The aura is
      inactive while you have the &amp;Reference[Incapacitated apply=false]
      condition.</p>
