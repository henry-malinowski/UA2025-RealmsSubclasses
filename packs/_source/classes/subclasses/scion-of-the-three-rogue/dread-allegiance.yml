  description:
    value: >-
      <p>Choose one of the Dead Three: Bane, Bhaal, or Myrkul. You gain
      Resistance to one type of damage and the ability to cast a cantrip, as
      detailed in the table below; Intelligence is your spellcasting ability for
      this cantrip. When you finish a &amp;Reference[Long Rest], you can change
      your choice.</p><table><thead><tr><td>God</td><td>Damage
      Resistence</td><td>Cantrip</td></tr></thead><tbody><tr><td>@UUID[Compendium.UA2025-RealmsSubclasses.classes.Item.uarsSotAllegiBan]{Bane}</td><td>&amp;Reference[Psychic]</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplMinorIllus]{Minor
      Illusion}</td></tr><tr><td>@UUID[Compendium.UA2025-RealmsSubclasses.classes.Item.uarsSotAllegiBha]{Bhaal}</td><td>&amp;Reference[Poison]</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplBladeWard0]{Blade
      Ward}</td></tr><tr><td>@UUID[Compendium.UA2025-RealmsSubclasses.classes.Item.uarsSotAllegiMyr]{Myrkul}</td><td>&amp;Reference[Necrotic]</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplChillTouch]{Chill
      Touch}</td></tr></tbody></table><section class="secret"
      id="secret-ardF1FDjkZt2cEDY"><p><strong>Foundry Note</strong></p><p>This
      alliegence may be changed when you complete a Long Rest. To change your
      allegiance, click the kebab icon on the right side of the character sheet
      and click "Edit". Switch to the Advancement tab. Click the gear icon in
      the level 3 section. This will allow you to select a different allegience
      and gain its features.</p></section>
