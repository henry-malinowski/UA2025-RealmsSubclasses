  description:
    value: >-
      <p>As a &amp;Reference[Bonus Action], you gain the benefits below for 10
      minutes or until you end them (no action required). Once you use this
      feature, you can’t use it again until you finish a &amp;Reference[Long
      Rest]. You can also restore your use of it by expending a level 5 spell
      slot (no action required).</p><p><em><strong>Flight.</strong></em> You
      have a Fly Speed of 60 feet and can hover.</p><p><em><strong>Minor
      Wish.</strong></em> When you or an ally in your Aura of Protection fails a
      D20 Test, you can take a &amp;Reference[Reaction]{Reaction} to make the
      D20 Test succeed instead.</p>
