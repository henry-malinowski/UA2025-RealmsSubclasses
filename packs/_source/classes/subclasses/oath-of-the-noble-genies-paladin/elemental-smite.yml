  description:
    value: >-
      <p>Immediately after you cast Divine Smite, you can expend one use of your
      Channel Divinity and invoke one of the following
      effects.</p><p><em><strong>Dao’s Crush.</strong></em> The target has the
      &amp;Reference[Grappled] condition (escape DC equal to your spell save
      DC). While Grappled, the target has the &amp;Reference[Restrained]
      condition.</p><p><em><strong>Djinni’s Escape.</strong></em> You teleport
      to an unoccupied space you can see within 30 feet of yourself and take on
      a mist-like form, which lasts until the end of your next turn. While in
      this form, you have Immunity to the &amp;Reference[Grappled apply=false],
      &amp;Reference[Prone apply=false], and &amp;Reference[Restrained
      apply=false] conditions.</p><p><em><strong>Efreeti’s Fury.</strong></em>
      The target takes an extra [[/damage type=fire 2d4]]
      damage.</p><p><em><strong>Marid’s Surge.</strong></em> The target and each
      creature of your choice in a 10-foot Emanation originating from you makes
      a Strength saving throw against your spell save DC. On a failed save, the
      creature is pushed 15 feet straight away from you and has the
      &amp;Reference[Prone] condition.</p>
