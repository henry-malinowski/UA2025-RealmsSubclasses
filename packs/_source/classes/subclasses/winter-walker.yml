  description:
    value: >-
      <blockquote><p>Withstand the Horrors of Frigid
      Wastelands</p></blockquote><p>Winter Walkers hone their craft in the bleak
      and frozen wilds of places like Icewind Dale. Rimed with ice, these
      ruthless Rangers hunt the monsters that haunt arctic wastelands,
      eventually becoming frigid terrors themselves.</p><p>More so than any
      other Rangers of Icewind Dale, Winter Walkers are known to be well versed
      in the paranormal phenomena specific to the realm, including the latent
      magic of fallen Netherese cities, endemic monsters like yetis and crag
      cats, and the rising threat of Underdark invaders. In exchange for their
      cold pragmatism, terrifying magic, and mastery of the region, these Winter
      Walkers are regarded with equal parts respect and fear.</p><p>Ten-Towns
      citizens say that it is Winter Walkers’ frequent exposure to malignant
      entities that gives them their fearsome powers. Many Reghed nomads, on the
      other hand, believe that nature spirits bestow Winter Walkers with a
      unique curse.</p>
